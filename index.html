<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapBooth — Virtual Photo Booth</title>
    <meta
      name="description"
      content="Aplikasi photo booth virtual dengan background pilihan, filter foto, dan fitur cetak langsung."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="print.css" media="print" />
  </head>
  <body>
    <!-- ===== LOADING SCREEN ===== -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <div class="loading-icon">📸</div>
        <h2>SnapBooth</h2>
        <div class="loading-bar"><div class="loading-fill"></div></div>
        <p>Mempersiapkan kamera...</p>
      </div>
    </div>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
      <div class="header-brand">
        <span class="brand-icon">📸</span>
        <h1 class="brand-title">Snap<span class="brand-accent">Booth</span></h1>
      </div>
      <div class="header-actions">
        <button
          id="btn-switch-camera"
          class="btn-icon"
          title="Ubah Kamera Depan/Belakang"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            ></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </button>
        <button id="btn-flip-camera" class="btn-icon" title="Mirror Kamera">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M1 4v6h6" />
            <path d="M23 20v-6h-6" />
            <path
              d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"
            />
          </svg>
        </button>
        <button id="btn-reset" class="btn-icon" title="Reset Sesi">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="1 4 1 10 7 10" />
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ===== MAIN APP ===== -->
    <main class="app-main">
      <!-- Left: Camera Preview -->
      <section class="camera-section">
        <div class="camera-wrapper">
          <!-- Countdown overlay -->
          <div id="countdown-overlay" class="countdown-overlay hidden">
            <span id="countdown-number" class="countdown-number">3</span>
          </div>
          <!-- Shutter flash overlay -->
          <div id="shutter-flash" class="shutter-flash hidden"></div>

          <!-- Video element (mirrored) -->
          <video id="video" autoplay playsinline muted></video>

          <!-- Canvas for compositing (hidden) -->
          <canvas id="canvas-main" class="hidden"></canvas>

          <!-- Live preview canvas (shown) -->
          <canvas id="canvas-preview" class="canvas-preview"></canvas>

          <!-- Hidden Image for Custom Frame -->
          <img
            id="img-frame-news"
            src="assets/backgrounds/frame_news.jpg"
            class="hidden"
          />
          <img
            id="img-frame-fashion"
            src="assets/backgrounds/frame_fashion_news.png"
            class="hidden"
          />
          <img
            id="img-frame-woman"
            src="assets/backgrounds/frame_woman_news.png"
            class="hidden"
          />
          <img
            id="img-frame-love"
            src="assets/backgrounds/frame_love_news.png"
            class="hidden"
          />

          <!-- Camera controls overlay -->
          <div class="camera-overlay-controls">
            <div id="filter-indicator" class="filter-badge">Normal</div>
          </div>
        </div>

        <!-- Capture Button -->
        <div class="capture-area">
          <div class="capture-timer-row">
            <span class="timer-label">Timer:</span>
            <button id="timer-0" class="btn-timer active" data-timer="0">
              Off
            </button>
            <button id="timer-3" class="btn-timer" data-timer="3">3s</button>
            <button id="timer-5" class="btn-timer" data-timer="5">5s</button>
          </div>
          <button id="btn-capture" class="btn-capture">
            <span class="capture-ring"></span>
            <span class="capture-inner">📸</span>
          </button>
          <p class="capture-hint">Klik untuk mengambil foto</p>
        </div>
      </section>

      <!-- Right: Controls Panel -->
      <aside class="controls-panel">
        <!-- Tabs -->
        <div class="panel-tabs">
          <button
            class="tab-btn active"
            data-tab="tab-background"
            id="tab-btn-background"
          >
            🖼️ Background
          </button>
          <button class="tab-btn" data-tab="tab-filter" id="tab-btn-filter">
            🎨 Filter
          </button>
          <button class="tab-btn" data-tab="tab-frame" id="tab-btn-frame">
            🖼 Frame
          </button>
        </div>

        <!-- Tab: Background -->
        <div class="tab-content active" id="tab-background">
          <div class="section-label">Pilih Background</div>
          <div class="bg-grid" id="bg-grid">
            <!-- None -->
            <button
              class="bg-item active"
              data-bg="none"
              id="bg-none"
              title="Tanpa Background"
            >
              <div class="bg-thumb bg-thumb-none">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="10" />
                  <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
                </svg>
              </div>
              <span>Tanpa BG</span>
            </button>
            <!-- Studio Gold -->
            <button
              class="bg-item"
              data-bg="assets/backgrounds/bg_studio_gold.png"
              id="bg-studio"
              title="Studio Gold"
            >
              <div
                class="bg-thumb"
                style="
                  background-image: url(&quot;assets/backgrounds/bg_studio_gold.png&quot;);
                "
              ></div>
              <span>Studio Gold</span>
            </button>
            <!-- Nature Forest -->
            <button
              class="bg-item"
              data-bg="assets/backgrounds/bg_nature_forest.png"
              id="bg-forest"
              title="Hutan"
            >
              <div
                class="bg-thumb"
                style="
                  background-image: url(&quot;assets/backgrounds/bg_nature_forest.png&quot;);
                "
              ></div>
              <span>Hutan</span>
            </button>
            <!-- City Night -->
            <button
              class="bg-item"
              data-bg="assets/backgrounds/bg_city_night.png"
              id="bg-city"
              title="Kota Malam"
            >
              <div
                class="bg-thumb"
                style="
                  background-image: url(&quot;assets/backgrounds/bg_city_night.png&quot;);
                "
              ></div>
              <span>Kota Malam</span>
            </button>
            <!-- Sunset Beach -->
            <button
              class="bg-item"
              data-bg="assets/backgrounds/bg_sunset_beach.png"
              id="bg-beach"
              title="Pantai Sunset"
            >
              <div
                class="bg-thumb"
                style="
                  background-image: url(&quot;assets/backgrounds/bg_sunset_beach.png&quot;);
                "
              ></div>
              <span>Pantai</span>
            </button>
            <!-- Galaxy -->
            <button
              class="bg-item"
              data-bg="assets/backgrounds/bg_galaxy_space.png"
              id="bg-galaxy"
              title="Galaxy"
            >
              <div
                class="bg-thumb"
                style="
                  background-image: url(&quot;assets/backgrounds/bg_galaxy_space.png&quot;);
                "
              ></div>
              <span>Galaxy</span>
            </button>
            <!-- Cherry Blossom -->
            <button
              class="bg-item"
              data-bg="assets/backgrounds/bg_cherry_blossom.png"
              id="bg-sakura"
              title="Sakura"
            >
              <div
                class="bg-thumb"
                style="
                  background-image: url(&quot;assets/backgrounds/bg_cherry_blossom.png&quot;);
                "
              ></div>
              <span>Sakura</span>
            </button>
            <!-- Upload Custom -->
            <button
              class="bg-item bg-upload"
              id="bg-upload-btn"
              title="Upload Background"
            >
              <div class="bg-thumb bg-thumb-upload">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                  <polyline points="17 8 12 3 7 8" />
                  <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
              </div>
              <span>Upload</span>
            </button>
            <input
              type="file"
              id="bg-upload-input"
              accept="image/*"
              class="hidden"
            />
          </div>
        </div>

        <!-- Tab: Filter -->
        <div class="tab-content" id="tab-filter">
          <div class="section-label">Pilih Filter</div>
          <div class="filter-grid" id="filter-grid">
            <button
              class="filter-item active"
              data-filter="none"
              id="filter-none"
            >
              <div class="filter-preview fp-none"></div>
              <span>Normal</span>
            </button>
            <button class="filter-item" data-filter="grayscale" id="filter-bw">
              <div class="filter-preview fp-bw"></div>
              <span>B&W</span>
            </button>
            <button class="filter-item" data-filter="sepia" id="filter-sepia">
              <div class="filter-preview fp-sepia"></div>
              <span>Sepia</span>
            </button>
            <button class="filter-item" data-filter="warm" id="filter-warm">
              <div class="filter-preview fp-warm"></div>
              <span>Warm</span>
            </button>
            <button class="filter-item" data-filter="cool" id="filter-cool">
              <div class="filter-preview fp-cool"></div>
              <span>Cool</span>
            </button>
            <button class="filter-item" data-filter="vivid" id="filter-vivid">
              <div class="filter-preview fp-vivid"></div>
              <span>Vivid</span>
            </button>
            <button
              class="filter-item"
              data-filter="vintage"
              id="filter-vintage"
            >
              <div class="filter-preview fp-vintage"></div>
              <span>Vintage</span>
            </button>
            <button class="filter-item" data-filter="drama" id="filter-drama">
              <div class="filter-preview fp-drama"></div>
              <span>Drama</span>
            </button>
          </div>
        </div>

        <!-- Tab: Frame -->
        <div class="tab-content" id="tab-frame">
          <div class="section-label">Pilih Frame</div>
          <div class="frame-grid" id="frame-grid">
            <button class="frame-item active" data-frame="none" id="frame-none">
              <div class="frame-preview frame-preview-none">
                <div class="fp-photo-area"></div>
              </div>
              <span>Polos</span>
            </button>
            <button
              class="frame-item"
              data-frame="polaroid"
              id="frame-polaroid"
            >
              <div class="frame-preview frame-preview-polaroid">
                <div class="fp-photo-area"></div>
                <div class="fp-polaroid-bottom"></div>
              </div>
              <span>Polaroid</span>
            </button>
            <button class="frame-item" data-frame="film" id="frame-film">
              <div class="frame-preview frame-preview-film">
                <div class="fp-film-holes">
                  <span></span><span></span><span></span>
                </div>
                <div class="fp-photo-area"></div>
                <div class="fp-film-holes">
                  <span></span><span></span><span></span>
                </div>
              </div>
              <span>Film Strip</span>
            </button>
            <button class="frame-item" data-frame="news" id="frame-news">
              <div class="frame-preview frame-preview-news">
                <div class="fp-photo-area"></div>
                <div class="fp-news-bar">BREAKING</div>
              </div>
              <span>Berita LIVE</span>
            </button>
            <button class="frame-item" data-frame="wanted" id="frame-wanted">
              <div class="frame-preview frame-preview-wanted">
                <div class="fp-wanted-text">WANTED</div>
                <div class="fp-photo-area"></div>
              </div>
              <span>Buronan</span>
            </button>
            <button
              class="frame-item"
              data-frame="magazine"
              id="frame-magazine"
            >
              <div class="frame-preview frame-preview-magazine">
                <div class="fp-mag-title">VOGUE</div>
                <div class="fp-photo-area"></div>
              </div>
              <span>Majalah</span>
            </button>
            <button
              class="frame-item"
              data-frame="newspaper_img"
              id="frame-newspaper-img"
            >
              <div
                class="frame-preview"
                style="
                  background: #e5e5e5;
                  padding: 4px;
                  display: flex;
                  flex-direction: column;
                "
              >
                <div
                  style="
                    font-size: 8px;
                    font-weight: 900;
                    text-align: center;
                    margin-bottom: 2px;
                  "
                >
                  BREAKING NEWS
                </div>
                <div
                  class="fp-photo-area"
                  style="flex: 1; background: #000"
                ></div>
              </div>
              <span>Koran (Foto)</span>
            </button>
            <button
              class="frame-item"
              data-frame="fashion_news_img"
              id="frame-fashion-img"
            >
              <div
                class="frame-preview"
                style="
                  background: #fdf5e6;
                  padding: 4px;
                  display: flex;
                  flex-direction: column;
                "
              >
                <div
                  style="
                    font-size: 8px;
                    font-weight: 900;
                    text-align: center;
                    margin-bottom: 2px;
                    font-family: serif;
                  "
                >
                  FASHION
                </div>
                <div
                  class="fp-photo-area"
                  style="flex: 1; background: #000"
                ></div>
              </div>
              <span>Berita Fashion</span>
            </button>
            <button
              class="frame-item"
              data-frame="woman_news_img"
              id="frame-woman-img"
            >
              <div
                class="frame-preview"
                style="
                  background: #ffe4e1;
                  padding: 4px;
                  display: flex;
                  flex-direction: column;
                "
              >
                <div
                  style="
                    font-size: 8px;
                    font-weight: 900;
                    text-align: center;
                    margin-bottom: 2px;
                    font-family: serif;
                    color: #d10068;
                  "
                >
                  WOMAN
                </div>
                <div
                  class="fp-photo-area"
                  style="flex: 1; background: #000"
                ></div>
              </div>
              <span>Woman News</span>
            </button>
            <button
              class="frame-item"
              data-frame="love_news_img"
              id="frame-love-img"
            >
              <div
                class="frame-preview"
                style="
                  background: #ffebee;
                  padding: 4px;
                  display: flex;
                  flex-direction: column;
                "
              >
                <div
                  style="
                    font-size: 8px;
                    font-weight: 900;
                    text-align: center;
                    margin-bottom: 2px;
                    font-family: serif;
                    color: #d32f2f;
                  "
                >
                  LOVE
                </div>
                <div
                  class="fp-photo-area"
                  style="flex: 1; background: #000"
                ></div>
              </div>
              <span>Love News</span>
            </button>
            <button class="frame-item" data-frame="missing" id="frame-missing">
              <div class="frame-preview frame-preview-missing">
                <div class="fp-missing-text">MISSING</div>
                <div class="fp-photo-area"></div>
              </div>
              <span>Orang Hilang</span>
            </button>
            <button
              class="frame-item"
              data-frame="prisoner"
              id="frame-prisoner"
            >
              <div class="frame-preview frame-preview-prisoner">
                <div class="fp-photo-area"></div>
                <div class="fp-prisoner-board">
                  <div class="fp-pb-text">DEPT. OF CORRECTIONS</div>
                </div>
              </div>
              <span>Tahanan</span>
            </button>
          </div>
        </div>
      </aside>
    </main>

    <!-- ===== GALLERY SECTION ===== -->
    <section class="gallery-section" id="gallery-section">
      <div class="gallery-header">
        <h2 class="gallery-title">📂 Hasil Foto</h2>
        <div class="gallery-actions">
          <button id="btn-print-all" class="btn-action btn-print" disabled>
            🖨️ Cetak Semua
          </button>
          <button id="btn-clear-gallery" class="btn-action btn-danger" disabled>
            🗑️ Hapus Semua
          </button>
        </div>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <div class="gallery-empty" id="gallery-empty">
          <span class="gallery-empty-icon">🖼️</span>
          <p>Belum ada foto. Klik capture untuk mulai!</p>
        </div>
      </div>
    </section>

    <!-- ===== PRINT MODAL ===== -->
    <div id="print-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>🖨️ Pilih Layout Cetak</h3>
          <button id="modal-close" class="btn-icon">✕</button>
        </div>
        <div class="print-layout-grid">
          <button class="print-layout-btn active" data-layout="1" id="layout-1">
            <div class="layout-preview lp-1">
              <div class="lp-photo"></div>
            </div>
            <span>1 Foto</span>
          </button>
          <button class="print-layout-btn" data-layout="2" id="layout-2">
            <div class="layout-preview lp-2">
              <div class="lp-photo"></div>
              <div class="lp-photo"></div>
            </div>
            <span>2 Foto</span>
          </button>
          <button class="print-layout-btn" data-layout="4" id="layout-4">
            <div class="layout-preview lp-4">
              <div class="lp-photo"></div>
              <div class="lp-photo"></div>
              <div class="lp-photo"></div>
              <div class="lp-photo"></div>
            </div>
            <span>4 Foto (Strip)</span>
          </button>
        </div>
        <div class="modal-footer">
          <button id="btn-do-print" class="btn-action btn-print">
            🖨️ Cetak Sekarang
          </button>
          <button id="btn-do-download" class="btn-action btn-download">
            💾 Download PNG
          </button>
        </div>
      </div>
    </div>

    <!-- ===== PRINT AREA (hidden, shown on print) ===== -->
    <div id="print-area" class="print-area"></div>

    <script src="app.js"></script>
  </body>
</html>
